name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 0 */5 * *'  # Runs every 5 days at midnight UTC
  workflow_dispatch:       # Allows manual trigger in the GitHub Actions UI

jobs:
  ping:
    runs-on: ubuntu-latest
    permissions:
      contents: write           # Needed to push the heartbeat commit

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install psycopg2-binary

      - name: Run keep-alive script
        run: python keepalive.py

      - name: Heartbeat commit (keeps GitHub Actions alive)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          echo "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > .github/.keepalive
          git add .github/.keepalive
          git diff --cached --quiet && echo "No changes to commit" || {
            git commit -m "chore: keepalive heartbeat [skip ci]"
            git push origin main
            echo "✅ Heartbeat commit pushed"
          }
